<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>근골격계 평가 - RULA / REBA / OWAS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand-mark">M</span>
      <div>
        <h1>근골격계 인간공학 평가</h1>
        <p class="subtitle">RULA · REBA · OWAS</p>
      </div>
    </div>
    <nav class="tabs" role="tablist">
      <button class="tab active" data-tool="RULA" role="tab">RULA</button>
      <button class="tab" data-tool="REBA" role="tab">REBA</button>
      <button class="tab" data-tool="OWAS" role="tab">OWAS</button>
    </nav>
  </header>

  <main class="layout">
    <section class="panel input-panel" id="inputPanel">
      <div class="panel-toolbar">
        <button class="btn btn-ghost" id="btnReset">초기화</button>
        <span class="toolbar-hint" id="toolbarHint">각 부위에서 해당하는 작업 자세를 모두 선택하세요</span>
      </div>
      <div id="partList">
        <!-- 부위별 카드는 JS로 동적 생성 -->
        <div class="loading">평가 데이터를 불러오는 중…</div>
      </div>
    </section>

    <aside class="panel result-panel" id="resultPanel">
      <h2 class="result-title" id="resultToolName">평가 결과</h2>
      <div class="score-big" id="scoreBig">
        <span class="score-value">—</span>
        <span class="score-grade" id="scoreGrade">평가 대기</span>
      </div>
      <p class="action-text" id="actionText">작업 자세 항목을 선택하세요.</p>

      <div class="viewer-section">
        <div class="viewer-head">
          <span class="viewer-title">자세 미리보기</span>
          <div class="viewer-toggle">
            <button class="vbtn active" id="vbtn2D" data-mode="2D">2D</button>
            <button class="vbtn" id="vbtn3D" data-mode="3D">3D</button>
          </div>
        </div>
        <div class="viewer-canvas" id="viewerCanvas">
          <!-- 2D SVG 또는 3D canvas가 렌더링됨 -->
        </div>
      </div>

      <div class="breakdown" id="breakdown">
        <!-- 부분 점수는 JS로 동적 생성 -->
      </div>
    </aside>
  </main>

  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three.module.js",
        "three/addons/controls/OrbitControls.js": "./vendor/OrbitControls.js"
      }
    }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
